<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>HiringFly — Entity Relationship Diagram</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        body {
            background: #0f1117;
            font-family: 'Inter', system-ui, sans-serif;
            color: #e2e8f0;
            overflow: hidden
        }

        /* toolbar */
        #toolbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 48px;
            background: #161b27;
            border-bottom: 1px solid #2a3148;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 0 16px;
            z-index: 100
        }

        #toolbar h1 {
            font-size: 13px;
            font-weight: 700;
            color: #e2e8f0;
            margin-right: 8px
        }

        .tb-sep {
            width: 1px;
            height: 20px;
            background: #2a3148
        }

        .tb-btn {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 5px 12px;
            border-radius: 6px;
            border: 1px solid #2a3148;
            background: transparent;
            color: #94a3b8;
            font-size: 12px;
            cursor: pointer;
            transition: all .15s
        }

        .tb-btn:hover {
            background: #1e2a40;
            color: #e2e8f0
        }

        .tb-badge {
            font-size: 10px;
            padding: 1px 6px;
            border-radius: 99px;
            background: #1e3a5f;
            color: #60a5fa;
            font-weight: 700
        }

        #legend {
            display: flex;
            gap: 14px;
            margin-left: auto;
            align-items: center
        }

        .leg {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 11px;
            color: #64748b
        }

        .leg-dot {
            width: 10px;
            height: 10px;
            border-radius: 2px
        }

        /* canvas */
        #canvas {
            position: fixed;
            top: 48px;
            left: 0;
            right: 0;
            bottom: 0;
            overflow: hidden;
            cursor: grab
        }

        #canvas:active {
            cursor: grabbing
        }

        #world {
            position: absolute;
            transform-origin: 0 0
        }

        /* SVG lines */
        #svg-layer {
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
            overflow: visible
        }

        /* table cards */
        .tbl {
            position: absolute;
            background: #161b27;
            border: 1.5px solid #2a3148;
            border-radius: 10px;
            min-width: 220px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, .4);
            cursor: move;
            user-select: none;
            transition: border-color .15s, box-shadow .15s
        }

        .tbl:hover {
            border-color: #3b5998;
            box-shadow: 0 8px 32px rgba(59, 91, 152, .25)
        }

        .tbl.selected {
            border-color: #3b82f6;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, .3)
        }

        .tbl-head {
            padding: 10px 12px 9px;
            border-bottom: 1px solid #2a3148;
            display: flex;
            align-items: center;
            gap: 8px;
            border-radius: 9px 9px 0 0
        }

        .tbl-icon {
            width: 22px;
            height: 22px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            flex-shrink: 0
        }

        .tbl-name {
            font-size: 12px;
            font-weight: 700;
            color: #e2e8f0;
            flex: 1
        }

        .tbl-count {
            font-size: 9px;
            color: #64748b;
            background: #1e293b;
            padding: 1px 5px;
            border-radius: 99px
        }

        .tbl-body {
            padding: 4px 0
        }

        .col-row {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 3.5px 10px;
            font-size: 11px
        }

        .col-row:hover {
            background: rgba(255, 255, 255, .03)
        }

        .col-key {
            font-size: 9px;
            font-weight: 800;
            padding: 1px 4px;
            border-radius: 3px;
            flex-shrink: 0;
            width: 18px;
            text-align: center
        }

        .pk {
            background: #713f12;
            color: #fbbf24
        }

        .fk {
            background: #1e3a5f;
            color: #60a5fa
        }

        .col-name {
            color: #cbd5e1;
            flex: 1;
            font-family: monospace
        }

        .col-type {
            color: #64748b;
            font-size: 10px;
            font-family: monospace
        }

        .col-null {
            color: #374151;
            font-size: 9px
        }

        .col-sep {
            height: 1px;
            background: #1e293b;
            margin: 3px 10px
        }

        /* zoom indicator */
        #zoom-info {
            position: fixed;
            bottom: 12px;
            right: 14px;
            font-size: 11px;
            color: #475569;
            background: #161b27;
            border: 1px solid #2a3148;
            padding: 4px 10px;
            border-radius: 6px;
            z-index: 100
        }

        /* tooltip */
        #tooltip {
            position: fixed;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 6px;
            padding: 6px 10px;
            font-size: 11px;
            color: #94a3b8;
            pointer-events: none;
            z-index: 200;
            display: none;
            max-width: 220px;
            line-height: 1.5
        }
    </style>
</head>

        // ─── Build tables ─────────────────────────────────────────────
        function buildTable(t) {
            positions[t.id] = { x: t.x, y: t.y };
            const el = document.createElement("div");
            el.className = "tbl";
            el.id = "tbl-" + t.id;
            el.style.left = t.x + "px";
            el.style.top = t.y + "px";

            const head = document.createElement("div");
            head.className = "tbl-head";
            head.style.background = t.color;
            head.innerHTML = `
    <div class="tbl-icon" style="background:${t.iconBg}">${t.icon}</div>
    <span class="tbl-name">${t.name}</span>
    <span class="tbl-count">${t.cols.length}</span>`;
            el.appendChild(head);

            const body = document.createElement("div");
            body.className = "tbl-body";

            t.cols.forEach((c, i) => {
                if (i > 0 && t.cols[i - 1].key !== c.key && c.key === "") {
                    const sep = document.createElement("div");
                    sep.className = "col-sep";
                    body.appendChild(sep);
                }
                const row = document.createElement("div");
                row.className = "col-row";
                const keyBg = c.key === "PK" ? "pk" : c.key === "FK" ? "fk" : "";
                row.innerHTML = `
      <span class="col-key ${keyBg}">${c.key || ""}</span>
      <span class="col-name">${c.name}</span>
      <span class="col-type">${c.type}</span>
      <span class="col-null">${c.null ? "NULL" : ""}</span>`;
                if (c.note) {
                    row.title = c.note;
                    row.style.cursor = "help";
                }
                body.appendChild(row);
            });
            el.appendChild(body);

            // drag
            head.addEventListener("mousedown", e => {
                if (e.button !== 0) return;
                e.stopPropagation();
                dragging = { id: t.id, el };
                dragStart = { mx: e.clientX, my: e.clientY, ox: positions[t.id].x, oy: positions[t.id].y };
                el.classList.add("selected");
                selectedId = t.id;
                e.preventDefault();
            });

            world.appendChild(el);
        }

        TABLES.forEach(buildTable);

        // ─── Draw SVG relations ───────────────────────────────────────
        function getAnchor(id, side) {
            const el = document.getElementById("tbl-" + id);
            const p = positions[id];
            const w = el.offsetWidth, h = el.offsetHeight;
            if (side === "right") return { x: p.x + w, y: p.y + 28 };
            if (side === "left") return { x: p.x, y: p.y + 28 };
            if (side === "bottom") return { x: p.x + w / 2, y: p.y + h };
            if (side === "top") return { x: p.x + w / 2, y: p.y };
        }

        function bestSide(from, to) {
            const fp = positions[from], tp = positions[to];
            const dx = tp.x - fp.x, dy = tp.y - fp.y;
            if (Math.abs(dx) > Math.abs(dy)) return dx > 0 ? ["right", "left"] : ["left", "right"];
            return dy > 0 ? ["bottom", "top"] : ["top", "bottom"];
        }

        function drawRelations() {
            svg.innerHTML = "";
            // defs for arrowhead
            svg.innerHTML = `<defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3b5998" opacity=".7"/>
    </marker>
    <marker id="arr-hi" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#60a5fa"/>
    </marker>
  </defs>`;

            RELATIONS.forEach(([ft, fc, tt, tc]) => {
                const [fs, ts] = bestSide(ft, tt);
                const a = getAnchor(ft, fs);
                const b = getAnchor(tt, ts);
                const cp = Math.min(Math.abs(b.x - a.x), 120);
                const cx1 = fs === "right" ? a.x + cp : a.x - cp;
                const cx2 = ts === "left" ? b.x - cp : ts === "right" ? b.x + cp : b.x;
                const path = `M${a.x},${a.y} C${cx1},${a.y} ${cx2},${b.y} ${b.x},${b.y}`;

                const line = document.createElementNS("http://www.w3.org/2000/svg", "path");
                line.setAttribute("d", path);
                line.setAttribute("stroke", "#3b5998");
                line.setAttribute("stroke-width", "1.5");
                line.setAttribute("fill", "none");
                line.setAttribute("stroke-opacity", "0.6");
                line.setAttribute("marker-end", "url(#arr)");
                line.dataset.from = ft;
                line.dataset.to = tt;
                svg.appendChild(line);
            });
        }

        // ─── Zoom / pan ───────────────────────────────────────────────
        function applyTransform() {
            world.style.transform = `translate(${tx}px,${ty}px) scale(${scale})`;
            document.getElementById("zoom-info").textContent = Math.round(scale * 100) + "%";
            drawRelations();
        }

        function zoomIn() { scale = Math.min(scale * 1.2, 3); applyTransform(); }
        function zoomOut() { scale = Math.max(scale / 1.2, 0.2); applyTransform(); }
        function resetView() { scale = 0.65; tx = 20; ty = 20; applyTransform(); }

        function fitAll() {
            const xs = TABLES.map(t => t.x), ys = TABLES.map(t => t.y);
            const minX = Math.min(...xs), minY = Math.min(...ys);
            const maxX = Math.max(...xs) + 250, maxY = Math.max(...ys) + 400;
            const cw = canvas.offsetWidth, ch = canvas.offsetHeight - 0;
            scale = Math.min(cw / (maxX - minX), (ch) / (maxY - minY)) * 0.88;
            scale = Math.min(scale, 2);
            tx = (cw - (maxX - minX) * scale) / 2 - minX * scale;
            ty = 20 - minY * scale;
            applyTransform();
        }

        // mouse wheel zoom
        canvas.addEventListener("wheel", e => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const mx = e.clientX - rect.left, my = e.clientY - rect.top;
            const prev = scale;
            scale = e.deltaY < 0 ? Math.min(scale * 1.12, 3) : Math.max(scale / 1.12, 0.15);
            tx = mx - (mx - tx) * (scale / prev);
            ty = my - (my - ty) * (scale / prev);
            applyTransform();
        }, { passive: false });

        // pan
        canvas.addEventListener("mousedown", e => {
            if (e.button === 0 && !dragging) {
                panning = true;
                panStart = { mx: e.clientX, my: e.clientY, tx, ty };
            }
        });

        document.addEventListener("mousemove", e => {
            if (dragging) {
                const dx = (e.clientX - dragStart.mx) / scale;
                const dy = (e.clientY - dragStart.my) / scale;
                positions[dragging.id].x = dragStart.ox + dx;
                positions[dragging.id].y = dragStart.oy + dy;
                dragging.el.style.left = positions[dragging.id].x + "px";
                dragging.el.style.top = positions[dragging.id].y + "px";
                drawRelations();
            } else if (panning) {
                tx = panStart.tx + (e.clientX - panStart.mx);
                ty = panStart.ty + (e.clientY - panStart.my);
                applyTransform();
            }
        });

        document.addEventListener("mouseup", () => {
            if (dragging) { dragging.el.classList.remove("selected"); dragging = null; }
            panning = false;
        });

        // init
        setTimeout(() => { fitAll(); }, 100);
    </script>
</body>

</html>
